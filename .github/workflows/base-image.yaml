name: Base Image

on:
  push:
    branches: [main]
    paths:
      - "base-image/**"
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cc-deck-base

jobs:
  # Check if base-image files changed (skip for releases and manual triggers)
  changes:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      base-image: ${{ steps.filter.outputs.base-image }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            base-image:
              - 'base-image/**'

  build-and-push:
    runs-on: ubuntu-latest
    # Run if: release, manual trigger, OR push with base-image changes
    if: |
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && needs.changes.outputs.base-image == 'true')
    needs: [changes]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract platform suffix
        id: platform
        run: |
          SUFFIX=$(echo "${{ matrix.platform }}" | tr '/' '-')
          echo "suffix=$SUFFIX" >> "$GITHUB_OUTPUT"

      - name: Build and push per-platform image
        uses: docker/build-push-action@v6
        with:
          context: base-image
          file: base-image/Containerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-${{ steps.platform.outputs.suffix }}
          cache-from: type=gha,scope=${{ steps.platform.outputs.suffix }}
          cache-to: type=gha,mode=max,scope=${{ steps.platform.outputs.suffix }}

  # Create multi-arch manifest after both platforms are built
  manifest:
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          # Add fedora version tag (extracted from Containerfile ARG)
          FEDORA_VERSION=$(grep -oP 'ARG FEDORA_VERSION=\K\d+' base-image/Containerfile || echo "")
          if [ -n "$FEDORA_VERSION" ]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:fedora-${FEDORA_VERSION}"
          fi
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Create and push multi-arch manifest
        run: |
          IFS=',' read -ra TAG_LIST <<< "${{ steps.tags.outputs.tags }}"
          for TAG in "${TAG_LIST[@]}"; do
            docker manifest create "$TAG" \
              "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-linux-amd64" \
              "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:build-linux-arm64"
            docker manifest push "$TAG"
            echo "Pushed: $TAG"
          done

  # Run verification tests on the published image
  verify:
    runs-on: ubuntu-latest
    needs: [manifest]
    steps:
      - uses: actions/checkout@v4

      - name: Run verification tests
        run: |
          chmod +x base-image/test.sh
          ./base-image/test.sh ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # Vulnerability scan (informational, non-blocking)
  scan:
    runs-on: ubuntu-latest
    needs: [manifest]
    continue-on-error: true
    steps:
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
