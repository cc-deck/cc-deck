name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: cc-deck/go.mod

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  container-images:
    name: Container Images (amd64)
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release binary
        run: |
          mkdir -p demo-image/build-context
          VERSION=${{ steps.version.outputs.version }}
          curl -fsSL "https://github.com/cc-deck/cc-deck/releases/download/${GITHUB_REF_NAME}/cc-deck_${VERSION}_linux_amd64.tar.gz" \
            | tar -xzf - -C /tmp cc-deck
          mv /tmp/cc-deck demo-image/build-context/cc-deck-linux-amd64
          chmod +x demo-image/build-context/cc-deck-linux-amd64

      - name: Log in to quay.io
        run: podman login -u "${{ secrets.QUAY_USERNAME }}" -p "${{ secrets.QUAY_PASSWORD }}" quay.io

      - name: Build and push base image (amd64)
        run: |
          VERSION=${{ steps.version.outputs.version }}
          podman build --platform linux/amd64 \
            -t quay.io/cc-deck/cc-deck-base:${VERSION} base-image/
          podman push quay.io/cc-deck/cc-deck-base:${VERSION}
          podman tag quay.io/cc-deck/cc-deck-base:${VERSION} quay.io/cc-deck/cc-deck-base:latest
          podman push quay.io/cc-deck/cc-deck-base:latest

      - name: Build and push demo image (amd64)
        run: |
          VERSION=${{ steps.version.outputs.version }}
          podman build --platform linux/amd64 \
            -t quay.io/cc-deck/cc-deck-demo:${VERSION} demo-image/
          podman push quay.io/cc-deck/cc-deck-demo:${VERSION}
          podman tag quay.io/cc-deck/cc-deck-demo:${VERSION} quay.io/cc-deck/cc-deck-demo:latest
          podman push quay.io/cc-deck/cc-deck-demo:latest
      # NOTE: Multi-arch (arm64) images are built and pushed locally via:
      #   make base-image-push
      #   make demo-image-push
