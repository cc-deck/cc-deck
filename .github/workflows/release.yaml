name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: cc-deck/go.mod

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  container-images:
    name: Container Images
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release binaries
        run: |
          mkdir -p demo-image/.build-context
          VERSION=${{ steps.version.outputs.version }}
          for arch in amd64 arm64; do
            curl -fsSL "https://github.com/cc-deck/cc-deck/releases/download/${GITHUB_REF_NAME}/cc-deck_${VERSION}_linux_${arch}.tar.gz" \
              | tar -xzf - -C /tmp cc-deck
            mv /tmp/cc-deck demo-image/.build-context/cc-deck-linux-${arch}
            chmod +x demo-image/.build-context/cc-deck-linux-${arch}
          done

      - name: Log in to quay.io
        run: podman login -u "${{ secrets.QUAY_USERNAME }}" -p "${{ secrets.QUAY_PASSWORD }}" quay.io

      - name: Build and push base image
        run: |
          VERSION=${{ steps.version.outputs.version }}
          podman manifest create quay.io/cc-deck/cc-deck-base:${VERSION}
          for arch in arm64 amd64; do
            podman build --platform linux/${arch} \
              -t quay.io/cc-deck/cc-deck-base:${VERSION}-${arch} base-image/
            podman manifest add quay.io/cc-deck/cc-deck-base:${VERSION} \
              quay.io/cc-deck/cc-deck-base:${VERSION}-${arch}
          done
          podman manifest push --all quay.io/cc-deck/cc-deck-base:${VERSION} \
            docker://quay.io/cc-deck/cc-deck-base:${VERSION}
          podman manifest push --all quay.io/cc-deck/cc-deck-base:${VERSION} \
            docker://quay.io/cc-deck/cc-deck-base:latest

      - name: Build and push demo image
        run: |
          VERSION=${{ steps.version.outputs.version }}
          podman manifest create quay.io/cc-deck/cc-deck-demo:${VERSION}
          for arch in arm64 amd64; do
            podman build --platform linux/${arch} \
              -t quay.io/cc-deck/cc-deck-demo:${VERSION}-${arch} demo-image/
            podman manifest add quay.io/cc-deck/cc-deck-demo:${VERSION} \
              quay.io/cc-deck/cc-deck-demo:${VERSION}-${arch}
          done
          podman manifest push --all quay.io/cc-deck/cc-deck-demo:${VERSION} \
            docker://quay.io/cc-deck/cc-deck-demo:${VERSION}
          podman manifest push --all quay.io/cc-deck/cc-deck-demo:${VERSION} \
            docker://quay.io/cc-deck/cc-deck-demo:latest
