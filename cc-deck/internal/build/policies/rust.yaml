key: pkg_rust
name: rust packages
match:
  tools:
    - rust
    - cargo
endpoints:
  - host: crates.io
    port: 443
  - host: index.crates.io
    port: 443
  - host: static.crates.io
    port: 443
binaries:
  - path: /usr/bin/cargo
  - path: /usr/local/bin/cargo
  - path: /sandbox/.cargo/bin/cargo
  - path: /sandbox/.rustup/toolchains/*/bin/cargo
