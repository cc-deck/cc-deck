key: pkg_rust
name: rust packages
match:
  tools:
    - rust
    - cargo
probe_binaries:
  - cargo
  - rustc
runtime_globs:
  - /sandbox/.rustup/toolchains/*/bin/cargo
  - /sandbox/.rustup/toolchains/*/bin/rustc
endpoints:
  - host: crates.io
    port: 443
  - host: index.crates.io
    port: 443
  - host: static.crates.io
    port: 443
