key: pkg_node
name: node packages
match:
  tools:
    - node
    - npm
endpoints:
  - host: registry.npmjs.org
    port: 443
  - host: npmjs.org
    port: 443
binaries:
  - path: /usr/bin/npm
  - path: /usr/bin/node
  - path: /usr/local/bin/npm
  - path: /usr/local/bin/node
  - path: /usr/local/bin/npx
