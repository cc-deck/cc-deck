version: 1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /dev/urandom
    - /dev/random
    - /dev/pts
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  claude_code:
    name: claude-code
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        access: full
      - host: statsig.anthropic.com
        port: 443
      - host: sentry.io
        port: 443
    binaries:
      - path: /usr/local/bin/claude
      - path: /usr/bin/node
  package_registries:
    name: package-registries
    endpoints:
      - host: registry.npmjs.org
        port: 443
      - host: pypi.org
        port: 443
      - host: files.pythonhosted.org
        port: 443
      - host: proxy.golang.org
        port: 443
      - host: sum.golang.org
        port: 443
      - host: crates.io
        port: 443
  git_hosting:
    name: git-hosting
    endpoints:
      - host: github.com
        port: 443
      - host: gitlab.com
        port: 443
    binaries:
      - path: /usr/bin/git
